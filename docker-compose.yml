version: '3.8'

services:
  # ============================================
  # Laravel Application (PHP 8.2-FPM)
  # ============================================
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        UID: '${UID:-1000}'
        GID: '${GID:-1000}'
    container_name: filament-app
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/var/www/html
    environment:
      - PHP_FPM_USER=www-data
      - PHP_FPM_GROUP=www-data
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    networks:
      - laravel-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -r 'try { fsockopen(\"127.0.0.1\", 9000); exit(0); } catch (Exception $e) { exit(1); }'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Nginx Web Server
  # ============================================
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: filament-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # MySQL 8.0 Database
  # ============================================
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: filament-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_DATABASE:-laravel}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - laravel-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: docker.m.daocloud.io/library/redis:alpine
    container_name: filament-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - laravel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Composer (for running composer commands)
  # ============================================
  composer:
    image: docker.m.daocloud.io/library/composer:latest
    container_name: filament-composer
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - app
    networks:
      - laravel-net
    profiles:
      - tools

  # ============================================
  # Artisan CLI
  # ============================================
  artisan:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        UID: '${UID:-1000}'
        GID: '${GID:-1000}'
    container_name: filament-artisan
    volumes:
      - .:/var/www/html
    entrypoint: ["php", "/var/www/html/artisan"]
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
    networks:
      - laravel-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    profiles:
      - tools

# ============================================
# Networks
# ============================================
networks:
  laravel-net:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
