# ============================================
# Base Docker Compose Configuration
# All environments inherit from this
# ============================================

services:
  # ============================================
  # Laravel Application (PHP 8.3-FPM Alpine)
  # ============================================
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: production
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/var/www/html
      - storage_upload:/var/www/html/storage/app/public
      - storage_framework:/var/www/html/storage/framework
      - storage_logs:/var/www/html/storage/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "pgrep", "php-fpm"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Nginx Web Server
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage_upload:/var/www/html/storage/app/public:ro
      - storage_framework:/var/www/html/storage/framework:ro
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ============================================
# Networks
# ============================================
networks:
  app-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_upload:
    driver: local
  storage_framework:
    driver: local
  storage_logs:
    driver: local
