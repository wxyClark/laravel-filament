# ============================================
# Testing Environment
# Uses: docker compose -f docker-compose.base.yml -f docker-compose.test.yml up
# ============================================

services:
  app:
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel_testing}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    ports:
      - "${NGINX_PORT:-8083}:80"

  mysql:
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_DATABASE:-laravel_testing}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  redis:
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_test_data:/data
    command: redis-server --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru

volumes:
  mysql_test_data:
    driver: local
  redis_test_data:
    driver: local
